<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-SQL Agent (Spring AI Alibaba)</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* ========== 基础样式重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }

        /* ========== 主容器 ========== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #1890ff;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }

        /* ========== 输入区域 ========== */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #question-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #question-input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        button {
            padding: 12px 30px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        button:hover {
            background: #40a9ff;
        }

        button:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
        }

        /* ========== 示例标签 ========== */
        .examples {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .example-tag {
            background: #e6f7ff;
            color: #1890ff;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #91d5ff;
        }

        .example-tag:hover {
            background: #1890ff;
            color: white;
        }

        /* ========== 结果容器 ========== */
        .result-container {
            min-height: 200px;
            border: 1px dashed #d9d9d9;
            border-radius: 4px;
            padding: 20px;
        }

        /* ========== 加载状态 ========== */
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
            font-size: 16px;
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #1890ff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 错误提示 ========== */
        .error {
            padding: 20px;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 4px;
            color: #cf1322;
        }

        .error h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .error p {
            font-size: 14px;
            line-height: 1.6;
            word-break: break-all;
        }

        /* ========== 组件容器 ========== */
        .component-container {
            margin-bottom: 20px;
        }

        /* ========== 数据表格 ========== */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        .data-table th {
            background: #fafafa;
            padding: 12px;
            border: 1px solid #e8e8e8;
            text-align: left;
            font-weight: 600;
            color: #333;
        }

        .data-table td {
            padding: 12px;
            border: 1px solid #e8e8e8;
            text-align: left;
            color: #666;
        }

        .data-table tr:nth-child(even) {
            background: #fafafa;
        }

        .data-table tr:hover {
            background: #e6f7ff;
        }

        .table-footer {
            text-align: center;
            padding: 10px;
            background: #fafafa;
            border-radius: 4px;
            color: #666;
            font-size: 14px;
        }

        /* ========== 表格滚动容器（Graph 模式） ========== */
        .table-scroll-container {
            max-height: 450px;
            overflow-y: auto;
            overflow-x: auto;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            display: block;
        }

        .table-scroll-container .data-table {
            margin-bottom: 0;
        }

        /* 固定表头：让 thead 粘在滚动容器顶部 */
        .table-scroll-container .data-table thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #fafafa;
        }

        /* ========== 分页按钮样式（单 Agent 模式） ========== */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
            padding: 10px;
        }

        .pagination-btn {
            padding: 8px 20px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .pagination-btn:hover {
            background: #40a9ff;
        }

        .pagination-btn:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
        }

        .pagination-info {
            color: #666;
            font-size: 14px;
        }

        /* ========== 数据点组件 ========== */
        .datapoint {
            text-align: center;
            padding: 60px;
            background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%);
            border-radius: 8px;
        }

        .datapoint-value {
            font-size: 72px;
            font-weight: bold;
            color: #1890ff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .datapoint-label {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
        }

        /* ========== 解释说明 ========== */
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #e6f7ff;
            border-left: 4px solid #1890ff;
            border-radius: 4px;
            color: #333;
            line-height: 1.6;
            font-size: 14px;
        }

        /* ========== 技术详情展示（调试用） ========== */
        .script-debug {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
        }

        .script-debug summary {
            cursor: pointer;
            font-weight: 500;
            color: #666;
        }

        .script-debug pre {
            margin-top: 10px;
            padding: 10px;
            background: #282c34;
            color: #abb2bf;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
        }

        .debug-section-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 14px;
            margin-bottom: 4px;
        }

        .debug-section-label:first-child {
            margin-top: 0;
        }

        .debug-sql-block {
            margin-top: 6px;
            padding: 10px;
            background: #1e1e2e;
            color: #89b4fa;
            border-radius: 4px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ========== 页脚 ========== */
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e8e8e8;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #1890ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ========== 执行日志面板（Graph 模式） ========== */
        .execution-log {
            margin-top: 20px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            overflow: hidden;
        }

        .execution-log summary {
            cursor: pointer;
            padding: 12px 15px;
            background: #fafafa;
            font-weight: 500;
            font-size: 14px;
            color: #333;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .execution-log summary:hover {
            background: #f0f0f0;
        }

        .execution-log-content {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            background: #fafafa;
            border-top: 1px solid #e8e8e8;
        }

        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 6px 0;
            font-size: 13px;
            line-height: 1.5;
            border-bottom: 1px solid #f0f0f0;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-node {
            flex-shrink: 0;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            font-family: monospace;
            white-space: nowrap;
        }

        .log-node-router { background: #e6f7ff; color: #1890ff; }
        .log-node-schema { background: #f6ffed; color: #52c41a; }
        .log-node-sql { background: #fff7e6; color: #fa8c16; }
        .log-node-validator { background: #f9f0ff; color: #722ed1; }
        .log-node-renderer { background: #fff0f6; color: #eb2f96; }
        .log-node-controller { background: #f5f5f5; color: #666; }
        .log-node-error { background: #fff2f0; color: #cf1322; }

        .log-message {
            color: #333;
            word-break: break-all;
        }

        .log-message-error {
            color: #cf1322;
        }

        .log-message-sql {
            font-family: monospace;
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }

        .log-copy-btn {
            padding: 4px 10px;
            background: #fafafa;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            color: #666;
            float: right;
            margin-bottom: 10px;
        }

        .log-copy-btn:hover {
            background: #e8e8e8;
        }

        /* ========== 增强错误提示 ========== */
        .error-enhanced {
            padding: 20px;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 4px;
        }

        .error-enhanced h3 {
            color: #cf1322;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .error-node-badge {
            display: inline-block;
            padding: 2px 10px;
            background: #fff0f0;
            border: 1px solid #ffccc7;
            border-radius: 12px;
            font-size: 12px;
            color: #cf1322;
            margin-bottom: 10px;
        }

        .error-detail {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 10px;
            background: #fafafa;
            border-radius: 4px;
            word-break: break-all;
        }

        .error-suggestion {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            padding: 10px;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .retry-btn {
            padding: 8px 20px;
            background: #ff4d4f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            background: #ff7875;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text-to-SQL Agent (Spring AI Alibaba)</h1>

        <!-- ⭐ 模式指示器 -->
        <div id="mode-indicator" style="text-align: center; margin-bottom: 20px;">
            <span id="mode-badge" style="
                display: inline-block;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 14px;
                font-weight: 500;
            "></span>
            <a href="?mode=single" style="margin-left: 10px; color: #1890ff; text-decoration: none;">切换到单Agent</a>
            <span style="color: #999; margin: 0 5px;">|</span>
            <a href="?mode=graph" style="color: #1890ff; text-decoration: none;">切换到Graph</a>
        </div>

        <!-- 示例问题 -->
        <div class="examples">
            <!-- Simple 路径 - 列表查询 → Table -->
            <span class="example-tag" onclick="setExample('列出所有客户的姓名和城市')">列出所有客户</span>
            <span class="example-tag" onclick="setExample('查询北京的客户')">北京客户</span>
            <span class="example-tag" onclick="setExample('查询最近一周的订单')">最近订单</span>
            <!-- Simple 路径 - 单值统计 → DataPoint -->
            <span class="example-tag" onclick="setExample('客户总数是多少')">客户总数</span>
            <span class="example-tag" onclick="setExample('所有订单的总金额是多少')">订单总金额</span>
            <!-- Complex 路径 - 分组统计 → BarChart -->
            <span class="example-tag" onclick="setExample('各城市客户数量对比')">城市客户对比</span>
            <span class="example-tag" onclick="setExample('各产品销售量排行')">产品销量排行</span>
            <!-- Complex 路径 - 多表关联 → Table -->
            <span class="example-tag" onclick="setExample('每个客户的订单数量')">客户订单数</span>
            <span class="example-tag" onclick="setExample('每个客户的消费总额')">客户消费额</span>
            <!-- Complex 路径 - 时间趋势 → LineChart -->
            <span class="example-tag" onclick="setExample('2024年每月订单量趋势')">月订单趋势</span>
            <span class="example-tag" onclick="setExample('每月销售额变化趋势')">月销售额趋势</span>
            <!-- Complex 路径 - 占比分布 → PieChart -->
            <span class="example-tag" onclick="setExample('统计各订单状态的数量分布')">订单状态分布</span>
            <span class="example-tag" onclick="setExample('各城市客户占比分布')">城市客户占比</span>
            <!-- Complex 路径 - 排行 → BarChart -->
            <span class="example-tag" onclick="setExample('消费金额最高的前10名客户')">消费TOP10</span>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <textarea id="question-input" placeholder="输入问题，例如：列出所有客户的姓名"></textarea>
            <button id="query-btn" onclick="handleQuery()">查询</button>
        </div>

        <!-- 结果容器 -->
        <div id="result-container" class="result-container">
            <div style="text-align: center; color: #999; padding: 60px;">
                请输入问题开始查询
            </div>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            <p>API 文档：<a href="/swagger-ui.html" target="_blank">Swagger UI</a> |
               健康检查：<a href="/actuator/health" target="_blank">/actuator/health</a></p>
        </div>
    </div>

    <script>
        // ============================================================
        // ⭐ 模式检测（通过 URL 参数）
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'single'; // 默认单 Agent 模式

        // API 端点
        const API_ENDPOINT = mode === 'graph'
            ? 'http://localhost:8082/agent/text2sql-graph'
            : 'http://localhost:8082/agent/text2sql';

        // 更新页面显示
        const modeBadge = document.getElementById('mode-badge');
        if (mode === 'graph') {
            modeBadge.textContent = '🔄 Graph 多Agent模式';
            modeBadge.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            modeBadge.style.color = 'white';
            document.title = 'Text-to-SQL Agent (Graph 版本)';
        } else {
            modeBadge.textContent = '⚡ 单Agent模式';
            modeBadge.style.background = '#e6f7ff';
            modeBadge.style.color = '#1890ff';
            modeBadge.style.border = '1px solid #91d5ff';
            document.title = 'Text-to-SQL Agent (单Agent 版本)';
        }

        console.log('[初始化] 当前模式:', mode);
        console.log('[初始化] API 端点:', API_ENDPOINT);

        // ============================================================
        // ⭐ 分页状态管理（仅单 Agent 模式使用）
        // ============================================================
        const paginationState = {
            lastQuestion: null,      // 用户原始问题
            nextCursor: null,        // 下一页游标（列表查询用）
            prevCursors: [],         // 历史游标栈（用于上一页）
            hasMore: false,          // 是否还有更多数据
            currentPage: 0,          // 当前页码（从0开始）
            queryType: 'list',       // 查询类型：'list' 或 'aggregation'
            lastScriptCode: null,    // 上次的脚本代码（调试用）
            lastExplanation: null    // 上次的解释
        };

        /**
         * 重置分页状态（新查询时调用）
         */
        function resetPaginationState() {
            paginationState.lastQuestion = null;
            paginationState.nextCursor = null;
            paginationState.prevCursors = [];
            paginationState.hasMore = false;
            paginationState.currentPage = 0;
            paginationState.queryType = 'list';
            paginationState.lastScriptCode = null;
            paginationState.lastExplanation = null;
        }

        // ============================================================
        // MCP Client 包装器
        // 用于前端直接调用 MCP Server (8083端口) 的工具
        // ============================================================
        const mcpClient = {
            /**
             * 获取表结构信息
             * @param {string} tableName - 表名
             * @returns {Promise<Object>} 表结构信息
             */
            async getSchema(tableName) {
                console.log('[mcpClient] 调用 getSchema:', tableName);
                try {
                    const response = await fetch('http://localhost:8083/mcp/tools/schema.get', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: tableName })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    console.log('[mcpClient] getSchema 结果:', data);
                    return data;
                } catch (error) {
                    console.error('[mcpClient] getSchema 失败:', error);
                    throw error;
                }
            },

            /**
             * 执行 SQL 查询
             * @param {string} sql - SQL 语句
             * @returns {Promise<Array>} 查询结果（转换为对象数组格式）
             *
             * MCP Server 返回格式: { columns: [...], rows: [[...], [...]], rowCount: n }
             * 转换后格式: [{ col1: val1, col2: val2 }, { col1: val3, col2: val4 }]
             */
            async executeSql(sql) {
                console.log('[mcpClient] 执行 SQL:', sql);
                try {
                    const response = await fetch('http://localhost:8083/mcp/tools/sql.run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sql: sql })
                    });

                    if (!response.ok) {
                        // 尝试获取错误详情
                        let errorDetail = response.statusText;
                        try {
                            const errorBody = await response.text();
                            if (errorBody) {
                                errorDetail = errorBody;
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                        console.error('[mcpClient] SQL 执行失败:', response.status, errorDetail);
                        throw new Error(`SQL执行失败 (HTTP ${response.status}): ${errorDetail}`);
                    }

                    const data = await response.json();
                    console.log('[mcpClient] SQL 原始结果:', data);

                    // 检查是否有错误信息
                    if (data.error) {
                        throw new Error(`SQL错误: ${data.error}`);
                    }

                    // 将 { columns, rows } 格式转换为对象数组格式
                    // 这样 LLM 生成的脚本可以直接使用 result.map() 等数组方法
                    const result = this._convertToObjectArray(data);
                    console.log('[mcpClient] SQL 转换后结果:', result);
                    return result;
                } catch (error) {
                    console.error('[mcpClient] executeSql 失败:', error);
                    throw error;
                }
            },

            /**
             * 将 MCP Server 返回的列式数据转换为增强的数组对象
             * @param {Object} data - MCP Server 返回的数据 { columns, rows, rowCount }
             * @returns {Array} 增强的数组对象，同时支持:
             *   - 数组操作: result.map(), result[0], result.length
             *   - 属性访问: result.rows, result.columns, result.rowCount
             *
             * 这样可以兼容 LLM 生成的两种写法:
             *   - result.map(row => ...)      // 直接当数组用
             *   - result.rows.map(row => ...) // 通过 .rows 访问
             */
            _convertToObjectArray(data) {
                if (!data || !data.columns || !data.rows) {
                    console.warn('[mcpClient] 数据格式不完整:', data);
                    // 返回空数组，但也添加 rows 属性
                    const emptyResult = [];
                    emptyResult.rows = [];
                    emptyResult.columns = [];
                    emptyResult.rowCount = 0;
                    return emptyResult;
                }

                const { columns, rows, rowCount } = data;

                // 转换每一行为对象
                const objectRows = rows.map(row => {
                    const obj = {};
                    columns.forEach((col, index) => {
                        // 同时保留原始列名和小写列名，兼容不同的 LLM 脚本写法
                        obj[col] = row[index];                    // 原始列名 (如 NAME, ID)
                        obj[col.toLowerCase()] = row[index];      // 小写列名 (如 name, id)
                        obj[col.toUpperCase()] = row[index];      // 大写列名 (如 NAME, ID)
                    });
                    return obj;
                });

                // 创建增强数组：既是数组，又有 rows/columns/rowCount 属性
                // 这样 result.map() 和 result.rows.map() 都能工作
                const enhancedResult = [...objectRows];
                enhancedResult.rows = objectRows;           // 兼容 result.rows[0].xxx
                enhancedResult.columns = columns;           // 列名信息
                enhancedResult.rowCount = rowCount || rows.length;  // 行数

                return enhancedResult;
            }
        };

        // ============================================================
        // 脚本执行引擎
        // 执行 LLM 生成的 JavaScript 脚本
        // ============================================================

        /**
         * 执行 LLM 生成的脚本代码
         * @param {string} scriptCode - JavaScript 脚本代码
         * @returns {Promise<Object>} 执行结果 { componentType, propertyData }
         */
        async function executeScript(scriptCode) {
            console.log('[执行脚本] 开始执行...');
            console.log('[脚本代码]', scriptCode);

            try {
                // 创建异步函数并执行
                // 将 mcpClient 作为参数传入，脚本中可以直接使用
                const func = new Function('mcpClient', `
                    return (async function() {
                        ${scriptCode}
                        return await generateData(mcpClient);
                    })();
                `);

                const result = await func(mcpClient);
                console.log('[执行脚本] 成功，结果:', result);
                return result;
            } catch (error) {
                console.error('[执行脚本] 失败:', error);
                throw new Error(`脚本执行失败: ${error.message}`);
            }
        }

        // ============================================================
        // 查询流程
        // ============================================================

        /**
         * 处理用户查询（首页查询）
         * 1. 调用后端 Agent 获取脚本
         * 2. 执行脚本获取数据
         * 3. 渲染组件显示结果
         */
        async function handleQuery() {
            const question = document.getElementById('question-input').value;
            if (!question.trim()) {
                alert('请输入问题');
                return;
            }

            // 单 Agent 模式：重置分页状态
            if (mode !== 'graph') {
                resetPaginationState();
                paginationState.lastQuestion = question;
                paginationState.currentPage = 1;
            }

            await executeQuery(question);
        }

        /**
         * 处理下一页查询（仅单 Agent 模式）
         * 根据查询类型使用不同的分页参数：
         * - 列表查询：cursor=ID（keyset分页）
         * - 聚合查询：page=页码（OFFSET分页）
         */
        async function handleNextPage() {
            if (!paginationState.lastQuestion) {
                console.warn('[分页] 无法翻页：缺少上下文');
                return;
            }

            let paginatedQuestion;
            const nextPage = paginationState.currentPage + 1;

            if (paginationState.queryType === 'aggregation') {
                paginatedQuestion = `${paginationState.lastQuestion}\npage=${nextPage}`;
                console.log('[分页] 聚合查询，请求第', nextPage, '页');
            } else {
                if (!paginationState.nextCursor) {
                    console.warn('[分页] 列表查询缺少cursor');
                    return;
                }
                paginationState.prevCursors.push(paginationState.nextCursor);
                paginatedQuestion = `${paginationState.lastQuestion}\ncursor=${paginationState.nextCursor}`;
                console.log('[分页] 列表查询，cursor=', paginationState.nextCursor);
            }

            paginationState.currentPage = nextPage;
            console.log('[分页] 请求下一页:', paginatedQuestion);
            await executeQuery(paginatedQuestion, true);
        }

        /**
         * 处理上一页查询（仅单 Agent 模式）
         * 根据查询类型使用不同的分页参数
         */
        async function handlePrevPage() {
            if (!paginationState.lastQuestion || paginationState.currentPage <= 1) {
                console.warn('[分页] 无法翻页：已是第一页');
                return;
            }

            const prevPage = paginationState.currentPage - 1;
            let paginatedQuestion;

            if (paginationState.queryType === 'aggregation') {
                if (prevPage === 1) {
                    paginatedQuestion = paginationState.lastQuestion;
                } else {
                    paginatedQuestion = `${paginationState.lastQuestion}\npage=${prevPage}`;
                }
                console.log('[分页] 聚合查询，返回第', prevPage, '页');
            } else {
                paginationState.prevCursors.pop();
                const prevCursor = paginationState.prevCursors.pop();

                if (prevPage === 1 || prevCursor === undefined) {
                    paginatedQuestion = paginationState.lastQuestion;
                    paginationState.prevCursors = [];
                } else {
                    paginatedQuestion = `${paginationState.lastQuestion}\ncursor=${prevCursor}`;
                    paginationState.prevCursors.push(prevCursor);
                }
                console.log('[分页] 列表查询，返回cursor=', prevCursor);
            }

            paginationState.currentPage = prevPage;
            console.log('[分页] 请求上一页:', paginatedQuestion);
            await executeQuery(paginatedQuestion, true);
        }

        /**
         * 执行查询的核心逻辑（首页和分页共用）
         * @param {string} question - 查询问题（可能包含cursor参数）
         * @param {boolean} isNextPage - 是否是翻页请求
         */
        async function executeQuery(question, isNextPage = false) {
            const resultContainer = document.getElementById('result-container');
            const queryBtn = document.getElementById('query-btn');

            // 显示加载状态
            resultContainer.innerHTML = `<div class="loading">${isNextPage ? '正在加载下一页...' : '正在查询...'}</div>`;
            queryBtn.disabled = true;
            queryBtn.textContent = '查询中...';

            let data = null;
            try {
                // 1. 调用后端 Agent，获取 LLM 生成的脚本
                console.log('[查询] 发送请求:', question);
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                data = await response.json();
                console.log('[查询] 后端返回:', data);

                // 检查是否有脚本代码
                if (!data.scriptCode) {
                    throw new Error('后端未返回脚本代码');
                }

                // 保存脚本和解释（调试用）
                if (mode !== 'graph') {
                    paginationState.lastScriptCode = data.scriptCode;
                    paginationState.lastExplanation = data.explanation;
                }

                // 2. 执行 LLM 生成的脚本
                const { componentType, propertyData } = await executeScript(data.scriptCode);

                // 3. 更新分页状态（仅单 Agent 模式）
                if (mode !== 'graph' && componentType === 'Table' && propertyData.pageInfo) {
                    paginationState.queryType = propertyData.queryType || 'list';
                    paginationState.hasMore = propertyData.pageInfo.hasMore;

                    if (paginationState.queryType === 'aggregation') {
                        paginationState.nextCursor = null;
                        console.log('[分页] 聚合查询状态更新:', {
                            queryType: 'aggregation',
                            currentPage: paginationState.currentPage,
                            hasMore: paginationState.hasMore
                        });
                    } else {
                        paginationState.nextCursor = propertyData.pageInfo.nextCursor;
                        console.log('[分页] 列表查询状态更新:', {
                            queryType: 'list',
                            nextCursor: paginationState.nextCursor,
                            hasMore: paginationState.hasMore,
                            currentPage: paginationState.currentPage
                        });
                    }
                } else if (mode !== 'graph') {
                    paginationState.hasMore = false;
                    paginationState.queryType = 'list';
                }

                // 4. 渲染组件（传入 executionLog 和 errorInfo）
                renderComponent(componentType, propertyData, data);

            } catch (error) {
                console.error('[查询] 失败:', error);
                // 如果 data 存在且有 errorInfo，显示增强错误提示
                if (typeof data !== 'undefined' && data && data.errorInfo) {
                    renderEnhancedError(data.errorInfo, data.executionLog);
                } else {
                    resultContainer.innerHTML = `
                        <div class="error">
                            <h3>查询失败</h3>
                            <p>${escapeHtml(error.message)}</p>
                            <button class="retry-btn" style="margin-top: 12px;" onclick="handleQuery()">重试</button>
                        </div>
                    `;
                }
            } finally {
                // 恢复按钮状态
                queryBtn.disabled = false;
                queryBtn.textContent = '查询';
            }
        }

        // ============================================================
        // 动态渲染组件
        // ============================================================

        /**
         * 根据组件类型渲染不同的 UI 组件
         * @param {string} componentType - 组件类型: Table, PieChart, DataPoint
         * @param {Object} propertyData - 组件数据
         * @param {Object} backendData - 后端返回的完整响应（含 explanation, scriptCode, executionLog, sql, queryType 等）
         */
        function renderComponent(componentType, propertyData, backendData) {
            const container = document.getElementById('result-container');
            container.innerHTML = '';

            console.log('[渲染] 组件类型:', componentType);
            console.log('[渲染] 数据:', propertyData);

            // 创建组件容器
            const componentDiv = document.createElement('div');
            componentDiv.className = 'component-container';

            // 根据类型渲染不同组件
            switch(componentType) {
                case 'Table':
                    renderTable(componentDiv, propertyData);
                    break;
                case 'PieChart':
                    renderPieChart(componentDiv, propertyData);
                    break;
                case 'LineChart':
                    renderLineChart(componentDiv, propertyData);
                    break;
                case 'BarChart':
                    renderBarChart(componentDiv, propertyData);
                    break;
                case 'DataPoint':
                    renderDataPoint(componentDiv, propertyData);
                    break;
                default:
                    componentDiv.innerHTML = `
                        <div class="error">
                            <h3>⚠️ 不支持的组件类型</h3>
                            <p>组件类型 "${escapeHtml(componentType)}" 暂不支持</p>
                        </div>
                    `;
            }

            container.appendChild(componentDiv);

            // 显示解释说明
            if (backendData.explanation) {
                const explanationDiv = document.createElement('div');
                explanationDiv.className = 'explanation';
                explanationDiv.innerHTML = `<strong>💡 说明：</strong>${escapeHtml(backendData.explanation)}`;
                container.appendChild(explanationDiv);
            }

            // Graph 模式：显示执行日志（可折叠）
            if (mode === 'graph' && backendData.executionLog) {
                const logDiv = renderExecutionLog(backendData.executionLog);
                container.appendChild(logDiv);
            }

            // 技术详情面板（可折叠）
            renderTechDetails(container, backendData);
        }

        /**
         * 渲染表格组件
         * 根据模式差异化展示：
         * - Graph 模式：固定高度滚动容器 + 数据量提示
         * - 单 Agent 模式：普通表格 + 分页按钮
         * @param {HTMLElement} container - 容器元素
         * @param {Object} data - 表格数据 { columns?, rows, pageInfo?, queryType? }
         */
        function renderTable(container, data) {
            console.log('[renderTable] 数据:', data);

            // 处理空数据
            if (!data || !data.rows || data.rows.length === 0) {
                const currentPage = paginationState.currentPage || 1;
                let emptyMessage = '暂无数据';
                let emptyHint = '请尝试调整查询条件。';

                if (mode !== 'graph' && currentPage > 1) {
                    emptyMessage = '已到达数据末尾';
                    emptyHint = '当前查询范围内没有更多数据了。';
                }

                container.innerHTML = `
                    <div class="error" style="background: #fffbe6; border-color: #ffe58f; color: #ad8b00;">
                        <h3 style="margin-bottom: 8px;">${emptyMessage}</h3>
                        <p>${emptyHint}</p>
                        ${mode !== 'graph' && currentPage > 1 ? '<button class="pagination-btn" style="margin-top: 10px;" onclick="handleQuery()">返回第一页</button>' : ''}
                    </div>
                `;
                return;
            }

            // 获取列名（从数据的第一行推断，或使用 columns 字段）
            // 过滤掉 key 和重复的大小写列名
            let columns = data.columns;
            if (!columns) {
                const allKeys = Object.keys(data.rows[0]);
                const seen = new Set();
                columns = allKeys.filter(k => {
                    if (k === 'key') return false;
                    const lower = k.toLowerCase();
                    if (seen.has(lower)) return false;
                    seen.add(lower);
                    return true;
                });
            }

            // 根据模式选择渲染方式
            if (mode === 'graph') {
                renderTableWithScroll(container, data, columns);
            } else {
                renderTableWithPagination(container, data, columns);
            }
        }

        /**
         * Graph 模式：固定高度滚动容器 + 数据量提示，无分页
         */
        function renderTableWithScroll(container, data, columns) {
            let html = '<div class="table-scroll-container">';
            html += '<table class="data-table">';

            // 表头
            html += '<thead><tr>';
            columns.forEach(col => {
                html += `<th>${escapeHtml(String(col))}</th>`;
            });
            html += '</tr></thead>';

            // 表体
            html += '<tbody>';
            data.rows.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    let value = row[col];
                    if (value === null || value === undefined) value = row[col.toLowerCase()];
                    if (value === null || value === undefined) value = row[col.toUpperCase()];
                    html += `<td>${value !== null && value !== undefined ? escapeHtml(String(value)) : '-'}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            html += '</div>';

            // 数据量提示
            html += `<div class="table-footer">共 ${data.rows.length} 条记录</div>`;

            container.innerHTML = html;
        }

        /**
         * 单 Agent 模式：普通表格 + 分页按钮
         */
        function renderTableWithPagination(container, data, columns) {
            let html = '<table class="data-table">';

            // 表头
            html += '<thead><tr>';
            columns.forEach(col => {
                html += `<th>${escapeHtml(String(col))}</th>`;
            });
            html += '</tr></thead>';

            // 表体
            html += '<tbody>';
            data.rows.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    let value = row[col];
                    if (value === null || value === undefined) value = row[col.toLowerCase()];
                    if (value === null || value === undefined) value = row[col.toUpperCase()];
                    html += `<td>${value !== null && value !== undefined ? escapeHtml(String(value)) : '-'}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';

            // 分页信息
            const displayCount = data.rows.length;
            const pageInfo = data.pageInfo || {};
            const hasMore = pageInfo.hasMore || false;
            const currentPage = paginationState.currentPage || 1;
            const queryType = data.queryType || 'list';
            const hasPrev = currentPage > 1;

            // 计算显示范围
            const startIndex = (currentPage - 1) * 20 + 1;
            const endIndex = startIndex + displayCount - 1;

            let footerText;
            if (queryType === 'aggregation') {
                footerText = `第 ${currentPage} 页，显示第 ${startIndex}-${endIndex} 条统计结果`;
            } else {
                footerText = `第 ${currentPage} 页，显示第 ${startIndex}-${endIndex} 条`;
            }

            html += `<div class="table-footer">${footerText}</div>`;

            // 分页按钮区域
            html += `<div class="pagination-container">`;

            if (hasPrev) {
                html += `<button class="pagination-btn" onclick="handlePrevPage()">← 上一页</button>`;
            }

            html += `<span class="pagination-info">第 ${currentPage} 页</span>`;

            if (hasMore) {
                html += `<button class="pagination-btn" onclick="handleNextPage()">下一页 →</button>`;
            } else if (displayCount > 0) {
                html += `<span class="pagination-info" style="color: #52c41a;">✓ 已是最后一页</span>`;
            }

            html += `</div>`;

            container.innerHTML = html;
        }

        /**
         * 渲染饼图组件
         * @param {HTMLElement} container - 容器元素
         * @param {Array} data - 饼图数据 [{ name, value }, ...]
         */
        function renderPieChart(container, data) {
            console.log('[renderPieChart] 数据:', data);

            // 检查数据是否有效
            if (!data || !Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<div class="error">饼图数据为空</div>';
                return;
            }

            // 大数据量处理：超过 15 条时，保留前 14 条，其余合并为"其他"
            const MAX_PIE_SLICES = 15;
            let pieData = data;
            if (data.length > MAX_PIE_SLICES) {
                // 按 value 降序排序
                const sorted = [...data].sort((a, b) => (b.value || 0) - (a.value || 0));
                const top = sorted.slice(0, MAX_PIE_SLICES - 1);
                const rest = sorted.slice(MAX_PIE_SLICES - 1);
                const otherValue = rest.reduce((sum, item) => sum + (item.value || 0), 0);
                top.push({ name: '其他（' + rest.length + '项）', value: otherValue });
                pieData = top;
            }

            // 创建图表容器，增加高度
            const chartDiv = document.createElement('div');
            chartDiv.style.width = '100%';
            chartDiv.style.height = '500px';
            chartDiv.style.minHeight = '400px';
            container.appendChild(chartDiv);

            // 数据量提示
            if (data.length > MAX_PIE_SLICES) {
                const tipDiv = document.createElement('div');
                tipDiv.className = 'table-footer';
                tipDiv.textContent = '共 ' + data.length + ' 条数据，仅显示前 ' + (MAX_PIE_SLICES - 1) + ' 项，其余合并为"其他"';
                container.appendChild(tipDiv);
            }

            // 延迟初始化，确保 DOM 已渲染
            setTimeout(() => {
                // 初始化 ECharts
                const chart = echarts.init(chartDiv);

                // 配置饼图 - 使用更大的尺寸和更好的布局
                const option = {
                    title: {
                        text: '数据分布',
                        left: 'center',
                        top: 20,
                        textStyle: {
                            color: '#333',
                            fontSize: 18,
                            fontWeight: 'bold'
                        }
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}: {c} ({d}%)',
                        backgroundColor: 'rgba(50, 50, 50, 0.9)',
                        textStyle: { color: '#fff' }
                    },
                    legend: {
                        orient: 'horizontal',
                        bottom: 20,
                        left: 'center',
                        itemGap: 20
                    },
                    color: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4'],
                    series: [{
                        type: 'pie',
                        radius: ['35%', '65%'],
                        center: ['50%', '45%'],
                        avoidLabelOverlap: true,
                        itemStyle: {
                            borderRadius: 8,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: true,
                            formatter: '{b}\n{d}%',
                            fontSize: 12,
                            lineHeight: 18
                        },
                        labelLine: {
                            show: true,
                            length: 15,
                            length2: 10
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 14,
                                fontWeight: 'bold'
                            },
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.3)'
                            }
                        },
                        data: pieData
                    }]
                };

                chart.setOption(option);

                // 响应窗口大小变化
                const resizeHandler = () => chart.resize();
                window.addEventListener('resize', resizeHandler);

                // 在容器被移除时清理
                const observer = new MutationObserver((mutations) => {
                    if (!document.contains(chartDiv)) {
                        window.removeEventListener('resize', resizeHandler);
                        chart.dispose();
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true });
            }, 100);
        }

        /**
         * 渲染折线图组件（时间序列/趋势展示）
         * @param {HTMLElement} container - 容器元素
         * @param {Object|Array} data - 折线图数据
         *   - 简单格式: [{ name: 'x轴值', value: y轴值 }, ...]
         *   - 完整格式: { title: '标题', xAxisName: 'X轴名', yAxisName: 'Y轴名', data: [...] }
         */
        function renderLineChart(container, data) {
            console.log('[renderLineChart] 数据:', data);

            // 兼容两种数据格式
            let chartData, title, xAxisName, yAxisName;
            if (Array.isArray(data)) {
                chartData = data;
                title = '趋势图';
                xAxisName = '';
                yAxisName = '';
            } else {
                chartData = data.data || [];
                title = data.title || '趋势图';
                xAxisName = data.xAxisName || '';
                yAxisName = data.yAxisName || '';
            }

            // 检查数据是否有效
            if (!chartData || chartData.length === 0) {
                container.innerHTML = '<div class="error">折线图数据为空</div>';
                return;
            }

            // 创建图表容器
            const chartDiv = document.createElement('div');
            chartDiv.style.width = '100%';
            chartDiv.style.height = '450px';
            chartDiv.style.minHeight = '350px';
            container.appendChild(chartDiv);

            // 延迟初始化，确保 DOM 已渲染
            setTimeout(() => {
                const chart = echarts.init(chartDiv);

                // 提取 x 轴和 y 轴数据
                const xData = chartData.map(item => item.name);
                const yData = chartData.map(item => item.value);

                // 大数据量时启用 dataZoom
                const MAX_DISPLAY = 20;
                const needZoom = chartData.length > MAX_DISPLAY;
                const zoomEnd = needZoom ? (MAX_DISPLAY / chartData.length * 100) : 100;

                const dataZoomConfig = needZoom ? [
                    {
                        type: 'slider',
                        show: true,
                        xAxisIndex: 0,
                        start: 0,
                        end: zoomEnd,
                        bottom: 10,
                        height: 20,
                        borderColor: '#d9d9d9',
                        fillerColor: 'rgba(24, 144, 255, 0.15)',
                        handleStyle: { color: '#1890ff' }
                    },
                    {
                        type: 'inside',
                        xAxisIndex: 0,
                        zoomOnMouseWheel: true,
                        moveOnMouseMove: true
                    }
                ] : [];

                const option = {
                    title: {
                        text: title,
                        left: 'center',
                        top: 15,
                        textStyle: {
                            color: '#333',
                            fontSize: 18,
                            fontWeight: 'bold'
                        }
                    },
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(50, 50, 50, 0.9)',
                        textStyle: { color: '#fff' },
                        axisPointer: {
                            type: 'cross',
                            label: { backgroundColor: '#6a7985' }
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: needZoom ? '18%' : '10%',
                        top: '18%',
                        containLabel: true
                    },
                    dataZoom: dataZoomConfig,
                    xAxis: {
                        type: 'category',
                        name: xAxisName,
                        boundaryGap: false,
                        data: xData,
                        axisLine: { lineStyle: { color: '#999' } },
                        axisLabel: { color: '#666', rotate: xData.length > 10 ? 45 : 0 }
                    },
                    yAxis: {
                        type: 'value',
                        name: yAxisName,
                        axisLine: { lineStyle: { color: '#999' } },
                        axisLabel: { color: '#666' },
                        splitLine: { lineStyle: { type: 'dashed', color: '#e8e8e8' } }
                    },
                    series: [{
                        type: 'line',
                        data: yData,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        lineStyle: {
                            width: 3,
                            color: '#1890ff'
                        },
                        itemStyle: {
                            color: '#1890ff',
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(24, 144, 255, 0.3)' },
                                { offset: 1, color: 'rgba(24, 144, 255, 0.05)' }
                            ])
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowColor: 'rgba(24, 144, 255, 0.5)'
                            }
                        }
                    }]
                };

                chart.setOption(option);

                // 响应窗口大小变化
                const resizeHandler = () => chart.resize();
                window.addEventListener('resize', resizeHandler);

                // 在容器被移除时清理
                const observer = new MutationObserver((mutations) => {
                    if (!document.contains(chartDiv)) {
                        window.removeEventListener('resize', resizeHandler);
                        chart.dispose();
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true });
            }, 100);
        }

        /**
         * 渲染柱状图组件（类别对比展示）
         * @param {HTMLElement} container - 容器元素
         * @param {Object|Array} data - 柱状图数据
         *   - 简单格式: [{ name: '类别名', value: 数值 }, ...]
         *   - 完整格式: { title: '标题', xAxisName: 'X轴名', yAxisName: 'Y轴名', data: [...], horizontal: false }
         */
        function renderBarChart(container, data) {
            console.log('[renderBarChart] 数据:', data);

            // 兼容两种数据格式
            let chartData, title, xAxisName, yAxisName, horizontal;
            if (Array.isArray(data)) {
                chartData = data;
                title = '对比图';
                xAxisName = '';
                yAxisName = '';
                horizontal = false;
            } else {
                chartData = data.data || [];
                title = data.title || '对比图';
                xAxisName = data.xAxisName || '';
                yAxisName = data.yAxisName || '';
                horizontal = data.horizontal || false;
            }

            // 检查数据是否有效
            if (!chartData || chartData.length === 0) {
                container.innerHTML = '<div class="error">柱状图数据为空</div>';
                return;
            }

            // 创建图表容器
            const chartDiv = document.createElement('div');
            chartDiv.style.width = '100%';
            chartDiv.style.height = '450px';
            chartDiv.style.minHeight = '350px';
            container.appendChild(chartDiv);

            // 延迟初始化，确保 DOM 已渲染
            setTimeout(() => {
                const chart = echarts.init(chartDiv);

                // 提取类别名和数值
                const categories = chartData.map(item => item.name);
                const values = chartData.map(item => item.value);

                // 大数据量时启用 dataZoom
                const MAX_DISPLAY = 20;
                const needZoom = chartData.length > MAX_DISPLAY;
                const zoomEnd = needZoom ? (MAX_DISPLAY / chartData.length * 100) : 100;

                // 根据是否水平显示决定轴配置
                const categoryAxis = {
                    type: 'category',
                    name: horizontal ? yAxisName : xAxisName,
                    data: categories,
                    axisLine: { lineStyle: { color: '#999' } },
                    axisLabel: {
                        color: '#666',
                        rotate: !horizontal && categories.length > 8 ? 45 : 0,
                        interval: 0
                    }
                };

                const valueAxis = {
                    type: 'value',
                    name: horizontal ? xAxisName : yAxisName,
                    axisLine: { lineStyle: { color: '#999' } },
                    axisLabel: { color: '#666' },
                    splitLine: { lineStyle: { type: 'dashed', color: '#e8e8e8' } }
                };

                // dataZoom 配置（仅数据量超过阈值时启用）
                const dataZoomConfig = needZoom ? [
                    {
                        type: 'slider',
                        show: true,
                        start: 0,
                        end: zoomEnd,
                        ...(horizontal
                            ? { yAxisIndex: 0, right: 10, width: 20 }
                            : { xAxisIndex: 0, bottom: 10, height: 20 }),
                        borderColor: '#d9d9d9',
                        fillerColor: 'rgba(24, 144, 255, 0.15)',
                        handleStyle: { color: '#1890ff' }
                    },
                    {
                        type: 'inside',
                        ...(horizontal ? { yAxisIndex: 0 } : { xAxisIndex: 0 }),
                        zoomOnMouseWheel: true,
                        moveOnMouseMove: true
                    }
                ] : [];

                const option = {
                    title: {
                        text: title,
                        left: 'center',
                        top: 15,
                        textStyle: {
                            color: '#333',
                            fontSize: 18,
                            fontWeight: 'bold'
                        }
                    },
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(50, 50, 50, 0.9)',
                        textStyle: { color: '#fff' },
                        axisPointer: { type: 'shadow' }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: needZoom ? (horizontal ? '5%' : '18%') : (horizontal ? '5%' : '15%'),
                        top: '18%',
                        containLabel: true
                    },
                    dataZoom: dataZoomConfig,
                    xAxis: horizontal ? valueAxis : categoryAxis,
                    yAxis: horizontal ? categoryAxis : valueAxis,
                    series: [{
                        type: 'bar',
                        data: values,
                        barWidth: '50%',
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#1890ff' },
                                { offset: 1, color: '#69c0ff' }
                            ]),
                            borderRadius: [4, 4, 0, 0]
                        },
                        emphasis: {
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#40a9ff' },
                                    { offset: 1, color: '#91d5ff' }
                                ])
                            }
                        },
                        label: {
                            show: chartData.length <= 15,
                            position: horizontal ? 'right' : 'top',
                            color: '#666',
                            fontSize: 11
                        }
                    }]
                };

                chart.setOption(option);

                // 响应窗口大小变化
                const resizeHandler = () => chart.resize();
                window.addEventListener('resize', resizeHandler);

                // 在容器被移除时清理
                const observer = new MutationObserver((mutations) => {
                    if (!document.contains(chartDiv)) {
                        window.removeEventListener('resize', resizeHandler);
                        chart.dispose();
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true });
            }, 100);
        }

        /**
         * 渲染数据点组件（单个数值展示）
         * @param {HTMLElement} container - 容器元素
         * @param {Object} data - 数据 { value, label? }
         */
        function renderDataPoint(container, data) {
            console.log('[renderDataPoint] 数据:', data);

            const value = data.value !== undefined ? data.value : data;
            const label = data.label || '';

            container.innerHTML = `
                <div class="datapoint">
                    <div class="datapoint-value">${escapeHtml(String(value))}</div>
                    ${label ? `<div class="datapoint-label">${escapeHtml(label)}</div>` : ''}
                </div>
            `;
        }

        // ============================================================
        // 执行日志和增强错误展示
        // ============================================================

        /**
         * 渲染 Graph 执行日志面板
         * @param {string} logText - 后端返回的执行日志原始文本
         * @returns {HTMLElement} 日志面板 DOM 元素
         */
        function renderExecutionLog(logText) {
            const wrapper = document.createElement('div');
            wrapper.className = 'execution-log';

            // 解析日志条目（去重：AppendStrategy 会导致每次 merge 累积前面所有日志）
            const lines = logText.split('\n').filter(line => line.trim());
            const seen = new Set();
            const uniqueLines = lines.filter(line => {
                if (seen.has(line)) return false;
                seen.add(line);
                return true;
            });
            const entries = uniqueLines.map(line => parseLogEntry(line));

            let entriesHtml = '';
            entries.forEach(entry => {
                const nodeClass = getNodeColorClass(entry.node);
                const messageClass = entry.isError ? 'log-message log-message-error' : 'log-message';
                const messageContent = entry.isSql
                    ? `<span class="${messageClass}">${escapeHtml(entry.prefix)} <code class="log-message-sql">${escapeHtml(entry.sqlContent)}</code></span>`
                    : `<span class="${messageClass}">${escapeHtml(entry.message)}</span>`;

                entriesHtml += `
                    <div class="log-entry">
                        <span class="log-node ${nodeClass}">${escapeHtml(entry.node)}</span>
                        ${messageContent}
                    </div>
                `;
            });

            wrapper.innerHTML = `
                <details>
                    <summary>
                        <span>Graph 执行日志</span>
                        <span style="font-size: 12px; color: #999; font-weight: normal;">(${entries.length} 步)</span>
                    </summary>
                    <div class="execution-log-content">
                        <button class="log-copy-btn" onclick="copyExecutionLog(this)">复制日志</button>
                        <div style="clear: both;"></div>
                        ${entriesHtml}
                    </div>
                </details>
            `;

            // 存储去重后的日志文本用于复制
            wrapper.dataset.rawLog = uniqueLines.join('\n');

            return wrapper;
        }

        /**
         * 解析单条日志
         */
        function parseLogEntry(line) {
            // 格式: [timestamp] [NodeName] message
            const match = line.match(/^\[(\d+)\]\s*\[(\w+)\]\s*(.*)$/);
            if (!match) {
                return { node: 'System', message: line.replace(/^\[\d+\]\s*/, ''), isError: false, isSql: false };
            }

            const node = match[2];
            const message = match[3];
            const isError = message.includes('失败') || message.includes('错误');

            // 检查是否包含 SQL 语句
            const sqlMatch = message.match(/^(.*SQL:\s*)(.+)$/);
            if (sqlMatch) {
                return { node, message, isError, isSql: true, prefix: sqlMatch[1], sqlContent: sqlMatch[2] };
            }

            return { node, message, isError, isSql: false };
        }

        /**
         * 获取节点颜色 CSS 类名
         */
        function getNodeColorClass(nodeName) {
            if (nodeName.includes('Router')) return 'log-node-router';
            if (nodeName.includes('Schema')) return 'log-node-schema';
            if (nodeName.includes('Validator')) return 'log-node-validator';
            if (nodeName.includes('Sql') || nodeName.includes('SQL')) return 'log-node-sql';
            if (nodeName.includes('Renderer')) return 'log-node-renderer';
            if (nodeName.includes('Controller')) return 'log-node-controller';
            return 'log-node-controller';
        }

        /**
         * 复制执行日志到剪贴板
         */
        function copyExecutionLog(btn) {
            const wrapper = btn.closest('.execution-log');
            const rawLog = wrapper.dataset.rawLog;
            navigator.clipboard.writeText(rawLog).then(() => {
                const orig = btn.textContent;
                btn.textContent = '已复制';
                setTimeout(() => { btn.textContent = orig; }, 1500);
            });
        }

        /**
         * 渲染技术详情面板（SQL + 脚本代码）
         * @param {HTMLElement} container - 父容器
         * @param {Object} backendData - 后端返回的完整响应
         */
        function renderTechDetails(container, backendData) {
            const sql = backendData.sql;
            const scriptCode = backendData.scriptCode;
            const queryType = backendData.queryType;

            if (!sql && !scriptCode) return;

            const debugDiv = document.createElement('div');
            debugDiv.className = 'script-debug';

            let contentHtml = '';

            // Graph 模式显示查询路径标签
            if (mode === 'graph' && queryType) {
                const pathLabel = queryType === 'simple' ? 'Simple 路径（单表查询）' : 'Complex 路径（多表/聚合）';
                contentHtml += `<div class="debug-section-label" style="margin-bottom: 8px;">📍 ${pathLabel}</div>`;
            }

            // SQL 语句
            if (sql) {
                contentHtml += `<div class="debug-section-label">SQL 语句</div>`;
                contentHtml += `<div class="debug-sql-block">${escapeHtml(sql)}</div>`;
            }

            // 脚本代码
            if (scriptCode) {
                contentHtml += `<div class="debug-section-label" style="margin-top: 14px;">可视化脚本</div>`;
                contentHtml += `<pre>${escapeHtml(scriptCode)}</pre>`;
            }

            debugDiv.innerHTML = `
                <details>
                    <summary>🔧 技术详情</summary>
                    <div style="margin-top: 10px;">
                        ${contentHtml}
                    </div>
                </details>
            `;

            container.appendChild(debugDiv);
        }

        /**
         * 渲染增强版错误提示
         * @param {Object} errorInfo - 后端返回的结构化错误信息
         * @param {string} executionLog - 执行日志（可选）
         */
        function renderEnhancedError(errorInfo, executionLog) {
            const container = document.getElementById('result-container');

            // 映射错误类型到中文
            const errorTypeMap = {
                'LLM_ERROR': 'LLM 服务错误',
                'SQL_SYNTAX': 'SQL 语法错误',
                'TABLE_NOT_FOUND': '表不存在',
                'FIELD_NOT_FOUND': '字段不存在',
                'NETWORK_ERROR': '网络错误',
                'UNKNOWN': '未知错误'
            };

            // 映射节点名到中文
            const nodeNameMap = {
                'RouterNode': '路由节点',
                'SimpleSqlGeneratorNode': 'SQL 生成节点（简单）',
                'ComplexSqlGeneratorNode': 'SQL 生成节点（复杂）',
                'SchemaRetrievalNode': '表结构获取节点',
                'SqlValidatorNode': 'SQL 验证节点',
                'RendererNode': '脚本渲染节点',
                'GraphEngine': 'Graph 引擎'
            };

            const nodeLabel = nodeNameMap[errorInfo.failedNode] || errorInfo.failedNode;
            const typeLabel = errorTypeMap[errorInfo.errorType] || errorInfo.errorType;

            let html = `
                <div class="error-enhanced">
                    <h3>查询失败</h3>
                    <span class="error-node-badge">${escapeHtml(nodeLabel)} - ${escapeHtml(typeLabel)}</span>
            `;

            if (errorInfo.errorDetail) {
                html += `<div class="error-detail">${escapeHtml(errorInfo.errorDetail)}</div>`;
            }

            if (errorInfo.suggestion) {
                html += `<div class="error-suggestion">${escapeHtml(errorInfo.suggestion)}</div>`;
            }

            if (errorInfo.retryable) {
                html += `<button class="retry-btn" onclick="handleQuery()">重试</button>`;
            }

            html += `</div>`;

            container.innerHTML = html;

            // Graph 模式下，如果有日志，也显示
            if (mode === 'graph' && executionLog) {
                const logDiv = renderExecutionLog(executionLog);
                container.appendChild(logDiv);
            }
        }

        // ============================================================
        // 工具函数
        // ============================================================

        /**
         * HTML 转义，防止 XSS
         * @param {string} text - 原始文本
         * @returns {string} 转义后的文本
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * 设置示例问题
         * @param {string} text - 示例文本
         */
        function setExample(text) {
            document.getElementById('question-input').value = text;
        }

        // ============================================================
        // 键盘快捷键
        // ============================================================

        // 支持 Ctrl+Enter 提交查询
        document.getElementById('question-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                handleQuery();
            }
        });

        // 页面加载完成后的日志
        console.log('[初始化] Text-to-SQL Agent 前端已加载');
        console.log('[初始化] mcpClient 已就绪');
        console.log('[初始化] ECharts 版本:', echarts.version);
    </script>
</body>
</html>
